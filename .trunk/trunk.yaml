version: 0.1
cli:
  version: 1.21.0
plugins:
  sources:
    - id: trunk
      ref: v1.2.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - actionlint@1.6.27
    - checkov@3.2.47
    - git-diff-check
    - hadolint@2.12.1-beta
    - markdownlint@0.39.0
    - prettier@3.2.5
    - renovate@37.272.0
    - taplo@0.8.1
    - terrascan@1.19.1:
        commands:
          - lint
    - trivy@0.50.1
    - trufflehog@3.71.0
    - yamllint@1.35.1
  ignore:
    - linters:
        - markdownlint
      paths:
        - CHANGELOG.md
        - containers/*/CHANGELOG.md
runtimes:
  enabled:
    - node@18.12.1
    - python@3.10.8
actions:
  enabled:
    - commitlint
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
